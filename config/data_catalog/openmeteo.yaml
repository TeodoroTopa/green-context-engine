source: openmeteo
description: >
  Open-Meteo historical weather API — solar radiation, wind speed, temperature,
  and precipitation data at 10km resolution for any location on Earth. Data from
  ERA5 reanalysis, updated daily. Use for solar/wind resource context in energy
  stories. This is weather and resource data, not electricity generation data.
connector: pipeline.sources.openmeteo.OpenMeteoSource
env_key: ""

data_types:
  - "solar_radiation: average daily solar energy in kWh/m2/day — measures how much sunlight a location receives"
  - "wind_speed: average and max wind speed at 10m height in km/h"
  - "temperature: annual average, max, and min temperature in °C"
  - "precipitation: annual total precipitation in mm"

selectable: true
note: >
  The strategist should request this source when a story involves solar or wind
  energy projects and location-specific resource data would add context. For
  example, a story about a new solar farm should include solar_radiation to show
  how much sunlight the location receives. A story about wind power should
  include wind_speed. Temperature and precipitation are available but NOAA may
  be preferred when heating/cooling degree days are more relevant.

entities:
