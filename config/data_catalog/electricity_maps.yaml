source: electricity_maps
description: >
  Electricity Maps — real-time carbon intensity and power breakdown by
  electricity source. Covers 200+ zones globally. Note: free tier is limited
  to 1 zone and 50 requests/hour.
connector: pipeline.sources.electricity_maps.ElectricityMapsSource
env_key: ELECTRICITY_MAPS_API_KEY

data_types:
  - "carbon_intensity_realtime: real-time carbon intensity (gCO2eq/kWh)"
  - "power_breakdown: power consumption breakdown by source type (MW) — e.g., wind: 15000 MW, coal: 12000 MW"

entities:
  europe:
    - Germany
    - France
    - United Kingdom
    - Spain
    - Italy
    - Sweden
    - Norway
    - Denmark
    - Netherlands
    - Poland
    - Austria
    - Belgium
    - Switzerland
    - Portugal
    - Finland
    - Ireland
    - Greece
    - Czech Republic
    - Romania
    - Hungary
  asia_pacific:
    - Japan
    - South Korea
    - India
    - Australia
    - New Zealand
    - Taiwan
    - Singapore
  americas:
    - United States
    - Canada
    - Brazil
  africa:
    - South Africa
