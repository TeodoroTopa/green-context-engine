source: eia
description: >
  US electricity data from the Energy Information Administration (eia.gov).
  Covers electricity generation by fuel type at national and state level.
  US-only — does not cover international electricity data.
connector: pipeline.sources.eia.EIASource
env_key: EIA_API_KEY

data_types:
  - electricity generation by fuel type (thousand MWh, annual)
  - installed/operable generator capacity

coverage: "United States only (national + 50 states + DC)"

entities:
  national:
    - United States
  states:
