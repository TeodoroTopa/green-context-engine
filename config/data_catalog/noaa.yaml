source: noaa
description: >
  NOAA Climate Data Online — monthly temperature and precipitation summaries
  from the Global Summary of the Month (GSOM) dataset. Covers 180+ countries
  and all US states via the Global Historical Climatology Network.
connector: pipeline.sources.noaa.NOAASource
env_key: NOAA_API_KEY

data_types:
  - monthly average temperature (TAVG, Celsius)
  - monthly maximum temperature (TMAX, Celsius)
  - monthly minimum temperature (TMIN, Celsius)
  - monthly total precipitation (PRCP, mm)

