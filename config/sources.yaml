# Data source configuration
# Each source has its base URL, cache TTL, and endpoint paths.

ember:
  base_url: https://api.ember-energy.org/v1
  cache_ttl: 86400  # 24 hours — Ember updates monthly, no need to re-fetch often
  endpoints:
    generation_yearly: electricity-generation/yearly
    generation_monthly: electricity-generation/monthly
    carbon_intensity_yearly: carbon-intensity/yearly
    carbon_intensity_monthly: carbon-intensity/monthly
    emissions_yearly: power-sector-emissions/yearly
    emissions_monthly: power-sector-emissions/monthly
    demand_yearly: electricity-demand/yearly
    demand_monthly: electricity-demand/monthly
    capacity_monthly: installed-capacity/monthly

eia:
  base_url: https://api.eia.gov/v2
  cache_ttl: 86400  # 24 hours
  endpoints:
    us_generation: electricity/electric-power-operational-data/data
    international: international/data

nlr:
  base_url: https://developer.nlr.gov/api
  cache_ttl: 86400  # 24 hours — solar resource data is static

openmeteo:
  base_url: https://archive-api.open-meteo.com/v1
  cache_ttl: 86400  # 24 hours — historical data doesn't change

uk_carbon:
  base_url: https://api.carbonintensity.org.uk
  cache_ttl: 3600  # 1 hour — data updates every 30 min
