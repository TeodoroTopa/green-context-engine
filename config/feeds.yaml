# RSS feeds to monitor for energy/climate stories
feeds:
  - name: mongabay_energy
    url: "https://news.mongabay.com/feed/?post_type=post&feedtype=bulletpoints&topic=energy"
    source: mongabay
  - name: mongabay_environment
    url: "https://news.mongabay.com/feed/?post_type=post&feedtype=bulletpoints&topic=environment"
    source: mongabay
  - name: mongabay_climate
    url: "https://news.mongabay.com/feed/?post_type=post&feedtype=bulletpoints&topic=climate-change"
    source: mongabay

  - name: carbonbrief_main
    url: "https://www.carbonbrief.org/feed/"
    source: carbonbrief

  - name: pvmagazine
    url: "https://www.pv-magazine.com/feed/"
    source: pvmagazine

  - name: cleantechnica
    url: "https://cleantechnica.com/feed/"
    source: cleantechnica

  - name: utilitydive
    url: "https://www.utilitydive.com/feeds/news/"
